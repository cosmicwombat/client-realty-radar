<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<meta name="theme-color" content="#10b981" />
<title>Realty Radar</title>
<link rel="manifest" href="manifest.json" />
<style>
  :root{
    --bg:#0f1117; --surface:#1a1d27; --surface2:#222536; --border:#2e3147;
    --text:#e2e8f0; --muted:#94a3b8; --dim:#64748b; --accent:#10b981; --accent2:#22d3ee;
    --warn:#f59e0b; --bad:#ef4444; --good:#10b981;
  }
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--text);font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding-bottom:72px}
  a{color:var(--accent2);text-decoration:none}
  .app-header{display:flex;justify-content:space-between;align-items:center;padding:12px 16px;background:var(--surface);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:20}
  .app-header h1{font-size:16px;margin:0;letter-spacing:.5px}
  .app-header h1 span{color:var(--accent)}
  .back-link{color:var(--muted);font-size:13px}
  .header-badge{font-size:11px;color:var(--muted);background:var(--surface2);padding:3px 8px;border-radius:20px;border:1px solid var(--border)}
  main{padding:16px;max-width:560px;margin:0 auto}
  .view{display:none} .view.active{display:block}
  h2{font-size:18px;margin:4px 0 14px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px}
  .card h3{margin:0 0 6px;font-size:15px}
  .muted{color:var(--muted)} .dim{color:var(--dim);font-size:12px}
  label{display:block;font-size:12px;color:var(--muted);margin:10px 0 4px}
  input,select,textarea{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:10px;padding:10px;font-size:15px}
  textarea{min-height:80px;resize:vertical}
  .row{display:flex;gap:10px} .row>*{flex:1}
  button{cursor:pointer;border:none;border-radius:10px;padding:11px 14px;font-size:14px;font-weight:600}
  .btn{background:var(--accent);color:#04221a}
  .btn-ghost{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
  .btn-sm{padding:7px 10px;font-size:12px;border-radius:8px}
  .pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);color:var(--muted);margin:2px 4px 2px 0}
  .pill.sold{background:#3b1d1d;border-color:#7f1d1d;color:#fca5a5}
  .pill.new{background:#10291f;border-color:#14532d;color:#86efac}
  .pill.val{background:#2a2410;border-color:#78350f;color:#fcd34d}
  .pill.fc{background:#3b1d1d;border-color:#7f1d1d;color:#fca5a5}
  .parcel{border-bottom:1px solid var(--border);padding:11px 0;cursor:pointer}
  .parcel:last-child{border-bottom:none}
  .parcel .addr{font-weight:600}
  .nav{position:fixed;bottom:0;left:0;right:0;display:flex;background:var(--surface);border-top:1px solid var(--border);z-index:20}
  .nav button{flex:1;background:none;color:var(--muted);font-size:11px;padding:10px 0;border-radius:0;display:flex;flex-direction:column;gap:3px;align-items:center}
  .nav button.active{color:var(--accent)}
  .nav .ic{font-size:18px}
  .overlay{position:fixed;inset:0;background:rgba(10,12,18,.96);z-index:50;overflow-y:auto;display:none}
  .overlay.active{display:block}
  .sheet{max-width:560px;margin:0 auto;padding:16px;padding-bottom:40px}
  .check{display:flex;align-items:center;gap:8px;margin:6px 0;font-size:14px;color:var(--text)}
  .check input{width:auto}
  .spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--dim);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;vertical-align:middle}
  @keyframes spin{to{transform:rotate(360deg)}}
  .empty{text-align:center;color:var(--dim);padding:30px 10px}
  .kv{display:flex;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--border);font-size:14px}
  .kv .k{color:var(--muted)}
  .ai-box{white-space:pre-wrap;background:var(--surface2);border:1px solid var(--border);border-radius:10px;padding:12px;margin-top:8px;font-size:14px}
  .toast{position:fixed;bottom:84px;left:50%;transform:translateX(-50%);background:var(--surface2);border:1px solid var(--border);padding:9px 16px;border-radius:20px;font-size:13px;z-index:60;opacity:0;transition:opacity .3s}
  .toast.show{opacity:1}
</style>
</head>
<body>
<header class="app-header">
  <a href="/portal/" class="back-link">← My Apps</a>
  <h1>Realty<span>Radar</span></h1>
  <span class="header-badge">🔒 Private</span>
</header>

<main>
  <!-- FEED -->
  <section id="view-feed" class="view active">
    <h2>What changed</h2>
    <div id="feedList"></div>
  </section>

  <!-- SEARCH -->
  <section id="view-search" class="view">
    <h2>Find land</h2>
    <div class="card">
      <label>Mode</label>
      <select id="sMode" onchange="onModeChange()">
        <option value="radius">Near an address (≤2 mi)</option>
        <option value="county">Whole county</option>
      </select>
      <div id="radiusFields">
        <label>Address or place</label>
        <input id="sAddr" placeholder="e.g. Acme, WA" />
        <label>Radius (miles, max 2)</label>
        <input id="sRadius" type="number" value="2" min="0.2" max="2" step="0.1" />
      </div>
      <div id="countyFields" style="display:none">
        <label>County</label>
        <select id="sCounty"><option>WHATCOM</option><option>SKAGIT</option></select>
        <label>Sold/transferred in the last (days, optional)</label>
        <input id="sTransfer" type="number" placeholder="e.g. 30" />
      </div>
      <div class="row">
        <div><label>Min acres</label><input id="sMinAc" type="number" value="2" step="0.1" /></div>
        <div><label>Max acres</label><input id="sMaxAc" type="number" value="3" step="0.1" /></div>
      </div>
      <label>Max value (optional)</label>
      <input id="sMaxVal" type="number" placeholder="e.g. 400000" />
      <label>Zoning contains</label>
      <input id="sZoning" value="RR" />
      <div class="check"><input type="checkbox" id="sVacant" checked /><label style="margin:0">Likely-vacant land only (no buildings)</label></div>
      <button class="btn" style="width:100%;margin-top:12px" onclick="runSearch()">Search</button>
    </div>
    <div id="searchResults"></div>
  </section>

  <!-- WATCHLIST -->
  <section id="view-watch" class="view">
    <h2>Watchlist &amp; Findings</h2>
    <div id="findList"></div>
  </section>
</main>

<!-- PARCEL DETAIL -->
<div id="detail" class="overlay"><div class="sheet" id="detailSheet"></div></div>

<nav class="nav">
  <button data-v="feed" class="active" onclick="show('feed')"><span class="ic">📡</span>Feed</button>
  <button data-v="search" onclick="show('search')"><span class="ic">🔍</span>Search</button>
  <button data-v="watch" onclick="show('watch')"><span class="ic">⭐</span>Watchlist</button>
</nav>
<div id="toast" class="toast"></div>

<script>
const WORKER = "https://realty-radar-worker.appsforhire.app";
const AI = "https://worker.appsforhire.app/ai";
let lastResults = {};          // parcels from the most recent search (for save+detail)
const cache = {};              // parcel_key -> full Realie record (detail = 0 extra calls)

// ---------- tiny helpers ----------
const $ = (id) => document.getElementById(id);
function toast(m){ const t=$("toast"); t.textContent=m; t.classList.add("show"); setTimeout(()=>t.classList.remove("show"),2200); }
function show(v){
  document.querySelectorAll(".view").forEach(s=>s.classList.remove("active"));
  $("view-"+v).classList.add("active");
  document.querySelectorAll(".nav button").forEach(b=>b.classList.toggle("active", b.dataset.v===v));
  if(v==="feed") loadFeed();
  if(v==="watch") loadFindings();
}
function onModeChange(){
  const m=$("sMode").value;
  $("radiusFields").style.display = m==="radius"?"block":"none";
  $("countyFields").style.display = m==="county"?"block":"none";
}
async function api(path, opts){
  const r = await fetch(WORKER+path, Object.assign({credentials:"include", headers:{"Content-Type":"application/json"}}, opts||{}));
  if(!r.ok){ const e=await r.json().catch(()=>({error:r.status})); throw new Error(e.error||("HTTP "+r.status)); }
  return r.json();
}
const money = (n)=> n==null?"—":"$"+Number(n).toLocaleString();
function pk(p){ return [(p.state||"").toUpperCase(),(p.county||"").toUpperCase(),(p.parcelId||p.parcel_number||"").toUpperCase()].join("|"); }

// ---------- geocoding (free OSM) ----------
async function geocode(q){
  const u="https://nominatim.openstreetmap.org/search?format=json&limit=1&q="+encodeURIComponent(q+", Washington, USA");
  const r=await fetch(u,{headers:{"Accept":"application/json"}});
  const j=await r.json();
  if(!j.length) throw new Error("Couldn't find that place");
  return {lat:parseFloat(j[0].lat), lon:parseFloat(j[0].lon)};
}

// ---------- filtering ----------
function passesFilters(p, f){
  const ac = p.acres;
  if(ac!=null){ if(ac < f.minAc || ac > f.maxAc) return false; }
  if(f.zoning && p.zoningCode && !String(p.zoningCode).toUpperCase().includes(f.zoning.toUpperCase())) return false;
  if(f.maxVal && (p.totalMarketValue||p.totalAssessedValue||0) > f.maxVal) return false;
  if(f.vacant){ const bc=p.buildingCount||0; if(bc>0 || p.yearBuilt) return false; }
  return true;
}

// ---------- SEARCH ----------
async function runSearch(){
  const box=$("searchResults"); box.innerHTML='<div class="empty"><span class="spinner"></span> Searching…</div>';
  const f={ minAc:parseFloat($("sMinAc").value)||0, maxAc:parseFloat($("sMaxAc").value)||9999,
            maxVal:parseFloat($("sMaxVal").value)||0, zoning:$("sZoning").value.trim(), vacant:$("sVacant").checked };
  try{
    let parcels=[], meta={mode:$("sMode").value};
    if($("sMode").value==="radius"){
      const g=await geocode($("sAddr").value.trim());
      const rad=Math.min(2, parseFloat($("sRadius").value)||2);
      meta = Object.assign(meta,{label:$("sAddr").value.trim()||"Area", center_lat:g.lat, center_lon:g.lon, radius_miles:rad});
      const d=await api(`/realie/location?latitude=${g.lat}&longitude=${g.lon}&radius=${rad}&limit=100`);
      parcels=d.properties||[];
    } else {
      const county=$("sCounty").value; const days=$("sTransfer").value.trim();
      meta=Object.assign(meta,{label:county+" county", county});
      let q=`/realie/search?state=WA&county=${encodeURIComponent(county)}&limit=100`;
      if(days) q+=`&transferedSince=${days}`;
      const d=await api(q); parcels=d.properties||[];
    }
    const filtered=parcels.filter(p=>passesFilters(p,f));
    filtered.forEach(p=>cache[pk(p)]=p);
    lastResults={parcels:filtered, meta, raw:parcels};
    renderResults(filtered, parcels.length, meta);
  }catch(e){ box.innerHTML=`<div class="card" style="border-color:var(--bad)">⚠️ ${e.message}</div>`; }
}
function renderResults(list, total, meta){
  const box=$("searchResults");
  let h=`<div class="card"><b>${list.length}</b> match your filters <span class="dim">(${total} parcels pulled)</span>
    <button class="btn btn-sm" style="float:right" onclick="saveArea()">＋ Watch this area</button></div>`;
  if(!list.length) h+='<div class="empty">No parcels matched. Loosen the filters or widen the area.</div>';
  h+='<div class="card">'+list.map(p=>parcelRow(p)).join("")+'</div>';
  box.innerHTML=h;
}
function parcelRow(p){
  const k=pk(p);
  const tags=[];
  if((p.buildingCount||0)===0 && !p.yearBuilt) tags.push('<span class="pill new">vacant</span>');
  if(p.forecloseCode) tags.push('<span class="pill fc">foreclosure</span>');
  return `<div class="parcel" onclick='openDetail(${JSON.stringify(k)})'>
    <div class="addr">${p.addressFull||p.address||p.parcelId||"(no address)"}</div>
    <div class="dim">${p.acres!=null?p.acres+" ac":"—"} · ${p.zoningCode||"?"} · ${money(p.totalMarketValue||p.totalAssessedValue)} ${tags.join(" ")}</div>
  </div>`;
}
async function saveArea(){
  if(!lastResults.parcels) return;
  const m=lastResults.meta;
  try{
    const {id}=await api("/db/areas",{method:"POST",body:JSON.stringify({
      label:m.label, mode:m.mode, county:m.county||null, center_lat:m.center_lat||null,
      center_lon:m.center_lon||null, radius_miles:m.radius_miles||2,
      min_acres:parseFloat($("sMinAc").value)||2, max_acres:parseFloat($("sMaxAc").value)||3,
      max_value:parseFloat($("sMaxVal").value)||null, vacant_only:$("sVacant").checked,
      zoning_filter:$("sZoning").value.trim()
    })});
    await api(`/db/areas/${id}/snapshot`,{method:"POST",body:JSON.stringify({parcels:lastResults.parcels})});
    toast("Watch area saved ✓"); show("feed");
  }catch(e){ toast("⚠️ "+e.message); }
}

// ---------- FEED ----------
async function loadFeed(){
  const box=$("feedList"); box.innerHTML='<div class="empty"><span class="spinner"></span></div>';
  try{
    const {areas}=await api("/db/areas");
    if(!areas.length){ box.innerHTML='<div class="empty">No watch areas yet.<br>Go to <b>Search</b> to set one up.</div>'; return; }
    box.innerHTML="";
    for(const a of areas){
      const ch=await api(`/db/areas/${a.id}/changes`);
      box.insertAdjacentHTML("beforeend", areaCard(a, ch));
    }
  }catch(e){ box.innerHTML=`<div class="card" style="border-color:var(--bad)">⚠️ ${e.message}</div>`; }
}
function areaCard(a, ch){
  const summary = ch.firstLook
    ? `<span class="dim">${ch.current.length} parcels tracked · refresh later to see changes</span>`
    : `${ch.new.length?`<span class="pill new">${ch.new.length} new</span>`:""}
       ${ch.sold.length?`<span class="pill sold">${ch.sold.length} sold/transferred</span>`:""}
       ${ch.valueChanged.length?`<span class="pill val">${ch.valueChanged.length} re-valued</span>`:""}
       ${(!ch.new.length&&!ch.sold.length&&!ch.valueChanged.length)?'<span class="dim">no changes since last refresh</span>':""}`;
  const changed=[...ch.sold.map(x=>({x,t:"sold"})),...ch.new.map(x=>({x,t:"new"})),...ch.valueChanged.map(x=>({x,t:"val"}))];
  const list = (changed.length?changed:ch.current.slice(0,8).map(x=>({x,t:""}))).map(({x,t})=>{
    const k=x.parcel_key;
    const tag=t==="sold"?'<span class="pill sold">sold</span>':t==="new"?'<span class="pill new">new</span>':t==="val"?'<span class="pill val">re-valued</span>':"";
    return `<div class="parcel" onclick='openDetailFromSnap(${JSON.stringify(k)})'>
      <div class="addr">${x.address_full||x.parcel_number||"(no address)"} ${tag}</div>
      <div class="dim">${x.acres!=null?x.acres+" ac":"—"} · ${x.zoning_code||"?"} · ${money(x.total_market_value||x.total_assessed_value)}</div></div>`;
  }).join("");
  return `<div class="card">
    <h3>${a.label} <span class="dim">${a.county||""}</span></h3>
    <div style="margin:4px 0 8px">${summary}</div>
    <div>${list||'<div class="dim">No parcels.</div>'}</div>
    <div style="margin-top:10px;display:flex;gap:8px;align-items:center">
      <button class="btn btn-sm" onclick="refreshArea(${a.id})">↻ Refresh</button>
      <button class="btn-ghost btn-sm" onclick="deleteArea(${a.id})">Delete</button>
      <span class="dim" style="margin-left:auto">${a.last_refreshed?("updated "+a.last_refreshed.replace("T"," ").slice(0,16)+" UTC"):""}</span>
    </div></div>`;
}
async function refreshArea(id){
  toast("Refreshing…");
  try{
    const {areas}=await api("/db/areas"); const a=areas.find(x=>x.id===id);
    let parcels=[];
    if(a.mode==="radius"){
      const d=await api(`/realie/location?latitude=${a.center_lat}&longitude=${a.center_lon}&radius=${a.radius_miles||2}&limit=100`);
      parcels=d.properties||[];
    } else {
      const d=await api(`/realie/search?state=${a.state}&county=${encodeURIComponent(a.county)}&limit=100`);
      parcels=d.properties||[];
    }
    const f={minAc:a.min_acres,maxAc:a.max_acres,maxVal:a.max_value,zoning:a.zoning_filter,vacant:!!a.vacant_only};
    const filtered=parcels.filter(p=>passesFilters(p,f));
    filtered.forEach(p=>cache[pk(p)]=p);
    await api(`/db/areas/${id}/snapshot`,{method:"POST",body:JSON.stringify({parcels:filtered})});
    toast("Refreshed ✓"); loadFeed();
  }catch(e){ toast("⚠️ "+e.message); }
}
async function deleteArea(id){ if(!confirm("Delete this watch area? (Your Findings notes are kept.)"))return;
  await api(`/db/areas/${id}`,{method:"DELETE"}); loadFeed(); }

// ---------- DETAIL ----------
function openDetail(key){ renderDetail(cache[key], key); }
function openDetailFromSnap(key){ renderDetail(cache[key]||null, key); }
async function renderDetail(p, key){
  const d=$("detail"); const s=$("detailSheet");
  const fRes=await api("/db/findings/"+encodeURIComponent(key)).catch(()=>({finding:null}));
  const fd=fRes.finding||{};
  const addr = p? (p.addressFull||p.address) : (fd.address_full||key);
  s.innerHTML=`
    <div style="display:flex;justify-content:space-between;align-items:center">
      <button class="btn-ghost btn-sm" onclick="closeDetail()">← Back</button>
      <button class="${fd.starred?'btn':'btn-ghost'} btn-sm" id="starBtn" onclick="toggleStar()">${fd.starred?'★ Starred':'☆ Star'}</button>
    </div>
    <h2 style="margin-top:12px">${addr||"(no address)"}</h2>
    <div class="dim">${key}</div>
    ${p?`<div class="card" style="margin-top:12px">
      <div class="kv"><span class="k">Owner</span><span>${p.ownerName||"—"}</span></div>
      <div class="kv"><span class="k">Zoning</span><span>${p.zoningCode||"—"}</span></div>
      <div class="kv"><span class="k">Acres</span><span>${p.acres??"—"}</span></div>
      <div class="kv"><span class="k">Market value</span><span>${money(p.totalMarketValue)}</span></div>
      <div class="kv"><span class="k">Assessed</span><span>${money(p.totalAssessedValue)} ${p.assessedYear?`(${p.assessedYear})`:""}</span></div>
      <div class="kv"><span class="k">Buildings</span><span>${(p.buildingCount||0)===0&&!p.yearBuilt?"none (likely vacant)":(p.buildingCount||"?")+(p.yearBuilt?" · built "+p.yearBuilt:"")}</span></div>
      <div class="kv"><span class="k">Last transfer</span><span>${p.transferDate||"—"} ${p.transferPrice?money(p.transferPrice):""}</span></div>
      ${p.forecloseCode?`<div class="kv"><span class="k">Foreclosure</span><span style="color:var(--bad)">${p.forecloseCode} ${p.forecloseFileDate||""}</span></div>`:""}
    </div>`:'<div class="card dim">Open this parcel from a fresh search to load full details (snapshot detail is limited).</div>'}

    <div class="card">
      <h3>Findings — your notes</h3>
      <div class="check"><input type="checkbox" id="fPower" ${fd.has_power?"checked":""}/><label style="margin:0">⚡ Power available</label></div>
      <div class="check"><input type="checkbox" id="fWater" ${fd.has_water?"checked":""}/><label style="margin:0">💧 Water (well/utility)</label></div>
      <div class="check"><input type="checkbox" id="fSeptic" ${fd.has_septic?"checked":""}/><label style="margin:0">🚽 Septic / sewer</label></div>
      <label>Status</label>
      <select id="fStatus">${["watching","contacted","visited","offer","passed"].map(o=>`<option ${fd.status===o?"selected":""}>${o}</option>`).join("")}</select>
      <label>Notes</label>
      <textarea id="fNote" placeholder="Soil, access, neighbours, asking price, anything you learn…">${fd.note||""}</textarea>
      <button class="btn" style="width:100%;margin-top:10px" onclick='saveFinding(${JSON.stringify(key)})'>Save finding</button>
    </div>

    <div class="card">
      <h3>Buildability checks</h3>
      <div class="dim" style="margin-bottom:8px">Free government data — power/water/septic still need your own legwork.</div>
      <button class="btn-ghost btn-sm" onclick='checkFlood(${p?p.latitude:"null"},${p?p.longitude:"null"})'>🌊 Flood zone</button>
      <button class="btn-ghost btn-sm" onclick='checkZoning(${JSON.stringify(p?p.county:(fd.county||""))},${p?p.latitude:"null"},${p?p.longitude:"null"})'>🗺️ County zoning</button>
      <div id="gisOut"></div>
    </div>

    <div class="card">
      <h3>Claude: farm + tiny-house fit</h3>
      <button class="btn" id="aiBtn" onclick='askClaude(${JSON.stringify(key)})'>Analyze this parcel</button>
      <div id="aiOut"></div>
    </div>`;
  d.classList.add("active"); d.dataset.key=key; window.scrollTo(0,0);
}
function closeDetail(){ $("detail").classList.remove("active"); }

async function toggleStar(){
  const key=$("detail").dataset.key;
  const cur=await api("/db/findings/"+encodeURIComponent(key)).catch(()=>({finding:{}}));
  const fd=cur.finding||{}; const p=cache[key]||{};
  await api("/db/findings/"+encodeURIComponent(key),{method:"PUT",body:JSON.stringify(Object.assign(fdToBody(fd,p,key),{starred:!fd.starred}))});
  renderDetail(cache[key]||null, key);
}
function fdToBody(fd,p,key){
  const [state,county,parcel]=key.split("|");
  return { state, county, parcel_number:parcel, address_full:(p.addressFull||p.address||fd.address_full||null),
    note:fd.note||null, status:fd.status||"watching", has_power:fd.has_power, has_water:fd.has_water, has_septic:fd.has_septic, starred:fd.starred };
}
async function saveFinding(key){
  const p=cache[key]||{}; const [state,county,parcel]=key.split("|");
  try{
    await api("/db/findings/"+encodeURIComponent(key),{method:"PUT",body:JSON.stringify({
      state, county, parcel_number:parcel, address_full:(p.addressFull||p.address||null),
      note:$("fNote").value, status:$("fStatus").value,
      has_power:$("fPower").checked, has_water:$("fWater").checked, has_septic:$("fSeptic").checked,
      starred: $("starBtn").textContent.includes("★")
    })});
    toast("Finding saved ✓");
  }catch(e){ toast("⚠️ "+e.message); }
}

// ---------- enrichment via /gis proxy ----------
async function checkFlood(lat,lon){
  const out=$("gisOut"); if(lat==null){ out.innerHTML='<div class="dim">No coordinates for this parcel.</div>'; return; }
  out.innerHTML='<div class="dim"><span class="spinner"></span> FEMA…</div>';
  const fema=`https://hazards.fema.gov/arcgis/rest/services/public/NFHL/MapServer/28/query?geometry=${lon},${lat}&geometryType=esriGeometryPoint&inSR=4326&spatialRel=esriSpatialRelIntersects&outFields=FLD_ZONE,ZONE_SUBTY&returnGeometry=false&f=json`;
  try{
    const r=await fetch(`${WORKER}/gis?url=`+encodeURIComponent(fema),{credentials:"include"});
    const j=await r.json(); const a=(j.features||[])[0];
    out.innerHTML = a ? `<div class="ai-box">Flood zone: <b>${a.attributes.FLD_ZONE||"?"}</b> ${a.attributes.ZONE_SUBTY?("· "+a.attributes.ZONE_SUBTY):""}</div>`
                      : '<div class="ai-box">No FEMA flood zone mapped at this point (often = minimal risk).</div>';
  }catch(e){ out.innerHTML=`<div class="dim">⚠️ ${e.message}</div>`; }
}
async function checkZoning(county,lat,lon){
  const out=$("gisOut"); if(lat==null){ out.innerHTML='<div class="dim">No coordinates.</div>'; return; }
  out.innerHTML='<div class="dim"><span class="spinner"></span> County GIS…</div>';
  const ext=`${lon-0.01},${lat-0.01},${lon+0.01},${lat+0.01}`;
  let svc = (county||"").toUpperCase().includes("SKAGIT")
    ? `https://gis.skagitcountywa.gov/arcgis/rest/services/Planning/ComprehensivePlanWebMap/MapServer/identify?geometry=${lon},${lat}&geometryType=esriGeometryPoint&sr=4326&tolerance=2&mapExtent=${ext}&imageDisplay=400,400,96&returnGeometry=false&f=json`
    : `https://gis.whatcomcounty.us/arcgis/rest/services/EnterprisePublishing/WhatcomCo_Planning/MapServer/identify?geometry=${lon},${lat}&geometryType=esriGeometryPoint&sr=4326&tolerance=2&mapExtent=${ext}&imageDisplay=400,400,96&returnGeometry=false&f=json`;
  try{
    const r=await fetch(`${WORKER}/gis?url=`+encodeURIComponent(svc),{credentials:"include"});
    const j=await r.json(); const res=(j.results||[]);
    out.innerHTML = res.length ? `<div class="ai-box">${res.slice(0,3).map(x=>x.layerName+": "+(x.value||"")).join("<br>")}</div>`
                               : '<div class="ai-box">No county zoning layer hit at this point.</div>';
  }catch(e){ out.innerHTML=`<div class="dim">⚠️ ${e.message}</div>`; }
}

// ---------- Claude ----------
async function askClaude(key){
  const p=cache[key]; const out=$("aiOut"); const btn=$("aiBtn");
  if(!p){ out.innerHTML='<div class="dim">Open this parcel from a fresh search to analyze it.</div>'; return; }
  btn.disabled=true; out.innerHTML='<div class="dim"><span class="spinner"></span> Thinking…</div>';
  const facts=`Parcel ${p.parcelId} in ${p.county} County, WA. Zoning: ${p.zoningCode}. Acres: ${p.acres}. `
    +`Buildings: ${(p.buildingCount||0)===0&&!p.yearBuilt?"none (vacant land)":p.buildingCount}. `
    +`Market value: ${p.totalMarketValue}. Last transfer: ${p.transferDate||"unknown"}. Foreclosure: ${p.forecloseCode||"no"}.`;
  try{
    const r=await fetch(AI,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({
      message:`I'm evaluating this rural parcel to build a small farm plus a couple of tiny houses:\n${facts}\n\nGive me a short, practical read: is this a promising candidate? What should I verify next (water/well, septic feasibility, access, zoning limits on dwellings)? Be concrete and brief.`,
      system:"You are a practical rural-land buying advisor for Whatcom/Skagit County, WA. Be concise, honest about unknowns, and never invent facts not given.",
      model_tier:"balanced"
    })});
    if(r.status===429){ out.innerHTML='<div class="ai-box">Rate limit hit.</div>'; btn.disabled=false; return; }
    const j=await r.json();
    const text=j.response||j.content||j.message||j.text||JSON.stringify(j);
    const safe=(typeof text==="string"?text:JSON.stringify(text)).replace(/</g,"&lt;");
    out.innerHTML=`<div class="ai-box">${safe}</div>
      <button class="btn-ghost btn-sm" style="margin-top:8px" onclick='navigator.clipboard.writeText(this.previousElementSibling.textContent);toast("Copied")'>Copy</button>
      <button class="btn-ghost btn-sm" style="margin-top:8px" onclick='askClaude(${JSON.stringify(key)})'>Again →</button>`;
  }catch(e){ out.innerHTML=`<div class="dim">⚠️ ${e.message}</div>`; }
  btn.disabled=false;
}

// ---------- findings list ----------
async function loadFindings(){
  const box=$("findList"); box.innerHTML='<div class="empty"><span class="spinner"></span></div>';
  try{
    const {findings}=await api("/db/findings");
    if(!findings.length){ box.innerHTML='<div class="empty">No findings yet. Open a parcel and save notes to build your shortlist.</div>'; return; }
    box.innerHTML='<div class="card">'+findings.map(f=>`
      <div class="parcel" onclick='openDetailFromSnap(${JSON.stringify(f.parcel_key)})'>
        <div class="addr">${f.starred?"★ ":""}${f.address_full||f.parcel_number}</div>
        <div class="dim">${f.status} · ${[f.has_power?"⚡":"",f.has_water?"💧":"",f.has_septic?"🚽":""].join("")||"no utilities marked"}</div>
        ${f.note?`<div class="muted" style="font-size:13px;margin-top:4px">${f.note.slice(0,90)}${f.note.length>90?"…":""}</div>`:""}
      </div>`).join("")+'</div>';
  }catch(e){ box.innerHTML=`<div class="card" style="border-color:var(--bad)">⚠️ ${e.message}</div>`; }
}

// boot
if("serviceWorker" in navigator) navigator.serviceWorker.register("sw.js").catch(()=>{});
loadFeed();
